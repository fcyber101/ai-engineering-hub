#version: '3.8'

services:
  youtube-transcript:
    image: fcyber/youtube-transcript:latest
    container_name: youtube-summary
    ports:
      - "8501:8501"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - TZ=UTC
    restart: unless-stopped
    volumes:
      - ./cache:/root/.cache  
      - ./logs:/app/logs     
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3